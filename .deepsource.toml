version = 1

exclude_patterns = [
  "**/node_modules/**",
  "**/dist/**",
  "**/build/**",
  "**/.next/**",
  "**/coverage/**",
  "**/*.min.js",
  "**/__generated__/**",
  "**/*.generated.*",
]

test_patterns = [
  "**/__tests__/**",
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/*.test.js",
  "**/*.test.jsx",
  "**/*.spec.ts",
  "**/*.spec.tsx",
  "**/*.spec.js",
  "**/*.spec.jsx",
]

[[analyzers]]
name = "javascript"

  [analyzers.meta]
  plugins = ["react"]
  environment = ["nodejs", "browser"]
  dialect = "typescript"
  module_system = "es-modules"
  # The codebase does not require JSDoc on every declaration; skip doc-coverage
  # (JS-D1001) for these node types so it isn't flagged across the repo.
  skip_doc_coverage = ["module", "class", "method", "function"]

[[analyzers]]
name = "docker"

[[transformers]]
name = "prettier"
