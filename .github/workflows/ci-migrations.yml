name: CI migrations

on:
  push:
    branches:
      - main
    paths:
      - 'backend/migrations/**'
      - '.github/workflows/ci-migrations.yml'
  pull_request:
    paths:
      - 'backend/migrations/**'
      - '.github/workflows/ci-migrations.yml'

env:
  NX_DAEMON: false

jobs:
  migrations-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck migrations
        run: pnpm --filter @erxes/migrations typecheck

      - name: Validate migration discovery
        run: pnpm --filter @erxes/migrations migrate:list
