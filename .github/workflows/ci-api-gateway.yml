name: CI Gateway

on:
  push:
    branches:
      - main
    paths:
      - 'backend/gateway/**'
      - 'backend/erxes-api-shared/**'
      - '.github/workflows/ci-api-gateway.yml'
  pull_request:
    paths:
      - 'backend/gateway/**'
      - 'backend/erxes-api-shared/**'
      - '.github/workflows/ci-api-gateway.yml'

env:
  NX_DAEMON: false

jobs:
  gateway-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install

      - name: Set environment variables
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV
          echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      # Gateway builds TypeScript inside Docker (builder stage),
      # but erxes-api-shared/dist is still needed in the build context (deployer stage)
      - name: Build shared module
        run: pnpm nx build erxes-api-shared

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Gateway uses linux/amd64 only — Apollo Router binary is glibc/amd64
      - name: Build and push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/gateway/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            erxes/erxes-next-gateway:latest
            erxes/erxes-next-gateway:${{ env.DATE }}-${{ env.SHORT_SHA }}
