name: opencode-sentry

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: opencode-sentry-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  opencode:
    name: Run OpenCode for Sentry issue
    if: |
      github.event.issue.pull_request == null &&
      contains(github.event.issue.labels.*.name, 'sentry') &&
      !contains(github.event.issue.labels.*.name, 'bug')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@2410593023d2c61f05123c9b0faf189a28dfbeee
        env:
          KIMI_API_KEY: ${{ secrets.KIMI_API_KEY }}
        with:
          model: kimi-for-coding/k2p6
          agent: erxes-sentry-fixer
          share: false
          prompt: |
            This GitHub issue was created from Sentry and has the `sentry` label.

            Analyze the issue title, body, labels, stack trace, and comments.

            Current testing mode:
            - Do not touch `main`.
            - Do not push to `main`.
            - The PR base branch must be `test/sentry-opencode`.
            - If the base branch `test/sentry-opencode` does not exist, stop and comment on the issue.
            - Do not expose secrets.
            - Do not read, print, or modify `.env` files.
            - Do not modify package files or lockfiles unless absolutely necessary for the fix.
            - Do not make broad refactors.
            - Make the smallest safe change only.

            Noise filter:
            If this looks like invalid password, login failure, expected auth error, bot traffic, bad user input, missing user permission, expired token, rate limit, external service outage, or non-code operational noise:
            - Do not create a branch.
            - Do not open a PR.
            - Only comment triage analysis on the issue.

            If the root cause is clear and the fix is safe:
            - Create a new branch from `test/sentry-opencode`.
            - Make the smallest safe fix.
            - Open a PR into `test/sentry-opencode`.
            - Comment on the issue with the PR link.

            Output required:
            1. What error is happening
            2. Likely affected Erxes service/plugin/file
            3. Likely root cause
            4. Whether a PR was created
            5. PR link if created
