name: Release

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  tag-backend-images:
    name: Tag backend Docker images
    runs-on: ubuntu-latest
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag all backend images with release version
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          for IMAGE in \
            erxes/erxes-next-core-api \
            erxes/erxes-next-gateway \
            erxes/erxes-next-sales_api \
            erxes/erxes-next-frontline_api \
            erxes/erxes-next-accounting_api \
            erxes/erxes-next-content_api \
            erxes/erxes-next-operation_api \
            erxes/erxes-next-payment_api \
            erxes/erxes-next-tourism_api \
            erxes/erxes-next-loyalty_api \
            erxes/erxes-next-mongolian_api \
            erxes/erxes-next-posclient_api \
            erxes/erxes-next-insurance_api \
            erxes/erxes-next-logs \
            erxes/erxes-next-automations \
            erxes/erxes-next-ui \
            erxes/posclient-front\
            erxes/frontline-widgets; do
            echo "Tagging $IMAGE:latest → $IMAGE:$VERSION"
            docker buildx imagetools create \
              -t "$IMAGE:$VERSION" \
              "$IMAGE:latest"
          done

  copy-frontend-assets:
    name: Copy frontend assets to versioned R2 folder
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
    steps:
      - name: Copy /latest/ → /version/ in Cloudflare R2
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          PLUGINS=(
            sales_ui frontline_ui accounting_ui content_ui operation_ui
            payment_ui tourism_ui loyalty_ui mongolian_ui insurance_ui
          )
          for PLUGIN in "${PLUGINS[@]}"; do
            echo "Copying $PLUGIN: s3://erxes-next/latest/$PLUGIN/ → s3://erxes-next/$VERSION/$PLUGIN/"
            aws s3 sync \
              "s3://erxes-next/latest/$PLUGIN/" \
              "/tmp/$PLUGIN/" \
              --endpoint-url "$R2_ENDPOINT"
            aws s3 sync \
              "/tmp/$PLUGIN/" \
              "s3://erxes-next/$VERSION/$PLUGIN/" \
              --endpoint-url "$R2_ENDPOINT"
          done
