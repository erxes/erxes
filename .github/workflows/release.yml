name: Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 3.0.4)'
        required: true

jobs:
  tag-docker-images:
    name: Tag ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - erxes/erxes-next-core-api
          - erxes/erxes-next-gateway
          - erxes/erxes-next-sales_api
          - erxes/erxes-next-frontline_api
          - erxes/erxes-next-accounting_api
          - erxes/erxes-next-content_api
          - erxes/erxes-next-operation_api
          - erxes/erxes-next-payment_api
          - erxes/erxes-next-tourism_api
          - erxes/erxes-next-loyalty_api
          - erxes/erxes-next-mongolian_api
          - erxes/erxes-next-posclient_api
          - erxes/erxes-next-insurance_api
          - erxes/erxes-next-logs
          - erxes/erxes-next-automations
          - erxes/erxes-next-ui
          - erxes/frontline-widgets
      fail-fast: false
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag ${{ matrix.image }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          docker buildx imagetools create -t "${{ matrix.image }}:$VERSION" "${{ matrix.image }}:latest"
