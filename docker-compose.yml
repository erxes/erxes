# erxes – full-stack Docker Compose
#
# Quickstart:
#   cp .env.example .env          # edit at minimum DOMAIN and JWT_TOKEN_SECRET
#   docker compose up -d
#
# The default profile starts the minimum set needed to use erxes:
#   MongoDB · Redis · gateway · core-api · core-ui
#
# Enable optional plugin groups with the ENABLED_PLUGINS env var *and*
# the matching Compose profile:
#
#   ENABLED_PLUGINS=sales,operation docker compose --profile plugins-base up -d
#
# Profiles:
#   (none / default) – infrastructure + core services + UI
#   plugins-base     – sales, operation, frontline, content
#   plugins-fin      – accounting, payment, loyalty
#   plugins-extra    – tourism, posclient, mongolian, insurance
#   services         – automations + logs background workers
#
# All environment variables are documented in .env.example.

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongo:
    image: mongo:6
    restart: unless-stopped
    networks:
      - erxes
    volumes:
      - mongo-data:/data/db
    # Uncomment to expose MongoDB to the host (useful for GUI tools like Compass).
    # Do NOT expose in production.
    # ports:
    #   - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - erxes
    command: >
      redis-server
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    # Uncomment to expose Redis to the host (useful for RedisInsight, etc.).
    # Do NOT expose in production.
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Core Backend ─────────────────────────────────────────────────────────────

  gateway:
    image: erxes/erxes-next-gateway:latest
    restart: unless-stopped
    networks:
      - erxes
    ports:
      - "${GATEWAY_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/erxes}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOMAIN: ${DOMAIN:-http://localhost:4000}
      WIDGETS_DOMAIN: ${WIDGETS_DOMAIN:-http://localhost:3200}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      JWT_TOKEN_SECRET: ${JWT_TOKEN_SECRET:?JWT_TOKEN_SECRET must be set in .env}
      # Only set ENABLED_PLUGINS when you actually have plugin containers running.
      # An empty string causes the gateway to wait for a plugin named "" indefinitely.
      # When running with plugin profiles add:  ENABLED_PLUGINS: ${ENABLED_PLUGINS}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  core-api:
    image: erxes/erxes-next-core-api:latest
    restart: unless-stopped
    networks:
      - erxes
    environment:
      NODE_ENV: production
      PORT: "3300"
      LOAD_BALANCER_ADDRESS: http://core-api:3300
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/erxes}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOMAIN: ${DOMAIN:-http://localhost:4000}
      WIDGETS_DOMAIN: ${WIDGETS_DOMAIN:-http://localhost:3200}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      JWT_TOKEN_SECRET: ${JWT_TOKEN_SECRET:?JWT_TOKEN_SECRET must be set in .env}
      FILE_UPLOAD_MAX_SIZE: ${FILE_UPLOAD_MAX_SIZE:-52428800}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ─────────────────────────────────────────────────────────────────

  core-ui:
    image: erxes/erxes-next-ui:latest
    restart: unless-stopped
    networks:
      - erxes
    ports:
      - "${UI_PORT:-3001}:80"
    environment:
      # Injected into window.env at container start via docker-entrypoint.sh
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:4000}
      REACT_APP_API_SUBSCRIPTION_URL: ${REACT_APP_API_SUBSCRIPTION_URL:-ws://localhost:4000/graphql}
      REACT_APP_CDN_HOST: ${REACT_APP_CDN_HOST:-http://localhost:3001}
      NGINX_HOST: ${NGINX_HOST:-localhost}
      NGINX_PORT: "80"
    depends_on:
      gateway:
        condition: service_healthy

  # ── Background Services ───────────────────────────────────────────────────────

  automations:
    image: erxes/erxes-next-automations:latest
    restart: unless-stopped
    networks:
      - erxes
    profiles: [services]
    environment:
      NODE_ENV: production
      PORT: "3302"
      LOAD_BALANCER_ADDRESS: http://automations:3302
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017/erxes}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      DOMAIN: ${DOMAIN:-http://localhost:4000}
      WIDGETS_DOMAIN: ${WIDGETS_DOMAIN:-http://localhost:3200}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  logs:
