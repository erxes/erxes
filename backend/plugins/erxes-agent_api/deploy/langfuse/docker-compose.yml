# Central Langfuse v3 — agent observability for ALL erxes tenants.
#
# Deploy ONCE on a dedicated host (not per client). Every client's erxes-agent
# then sets ERXES_AGENT_EVALUATION=enable + ERXES_AGENT_EVALUATION_DSN in its
# .env to ship traces + scores + feedback here, tagged by serviceName =
# erxes-agent:<subdomain>.
#
# The app (langfuse-web + langfuse-worker) is configured purely by full
# connection-string env vars — nothing host/port is hardcoded. Two ways to run:
#
#   • Managed stores (recommended for prod) — point the LANGFUSE_*_URL / key
#     vars in .env at your RDS / Clickhouse / Elasticache / S3, then:
#         docker compose up -d
#
#   • All-in-one box (dev / small) — also start the bundled stores via profile
#     (their service names match the all-in-one block in .env.example):
#         docker compose --profile bundled-stores up -d
#
# No depends_on between app and stores: Langfuse retries store connections on
# boot and `restart: unless-stopped` converges it — which also lets the app run
# against MANAGED stores with the bundled ones absent. (A depends_on on a
# profiled service would force that profile on even in managed mode.)
#
# Health:  curl $LANGFUSE_PUBLIC_URL/api/public/health
services:
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: langfuse-web
    ports:
      - "${LANGFUSE_PORT:-3000}:3000"
    environment:
      # ── App secrets (required — compose refuses to start without them) ──
      SALT: ${LANGFUSE_SALT:?set LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?set LANGFUSE_ENCRYPTION_KEY (openssl rand -hex 32)}
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?set LANGFUSE_NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${LANGFUSE_PUBLIC_URL:?set LANGFUSE_PUBLIC_URL}
      TELEMETRY_ENABLED: "false"
      # Sign-up OFF by default (secure from first boot). The admin seed below
      # creates the initial login, so there's no open-signup window and no
      # flip-flop. Leave the seed empty (e.g. local, where an account already
      # exists) to skip it.
      AUTH_DISABLE_SIGNUP: ${LANGFUSE_DISABLE_SIGNUP:-true}
      # First-boot admin seed (optional, idempotent — runs once). Langfuse can't
      # seed a user without an org, so the minimum is org id + admin email +
      # password (org/user display names are optional, omitted here); the admin
      # creates the PROJECT (and its API keys) after login.
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}
      # ── Backing stores (full connection strings — managed or bundled) ──
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:?set LANGFUSE_DATABASE_URL}
      CLICKHOUSE_URL: ${LANGFUSE_CLICKHOUSE_URL:?set LANGFUSE_CLICKHOUSE_URL}
      CLICKHOUSE_MIGRATION_URL: ${LANGFUSE_CLICKHOUSE_MIGRATION_URL:?set LANGFUSE_CLICKHOUSE_MIGRATION_URL}
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: ${LANGFUSE_REDIS_URL:?set LANGFUSE_REDIS_URL}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-auto}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ${LANGFUSE_S3_ENDPOINT:?set LANGFUSE_S3_ENDPOINT}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:?set LANGFUSE_S3_ACCESS_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:?set LANGFUSE_S3_SECRET_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: ${LANGFUSE_S3_FORCE_PATH_STYLE:-true}
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
    restart: unless-stopped

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse-worker
    environment:
      SALT: ${LANGFUSE_SALT:?set LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?set LANGFUSE_ENCRYPTION_KEY}
      DATABASE_URL: ${LANGFUSE_DATABASE_URL:?set LANGFUSE_DATABASE_URL}
      CLICKHOUSE_URL: ${LANGFUSE_CLICKHOUSE_URL:?set LANGFUSE_CLICKHOUSE_URL}
      CLICKHOUSE_MIGRATION_URL: ${LANGFUSE_CLICKHOUSE_MIGRATION_URL:?set LANGFUSE_CLICKHOUSE_MIGRATION_URL}
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: ${LANGFUSE_REDIS_URL:?set LANGFUSE_REDIS_URL}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-auto}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: ${LANGFUSE_S3_ENDPOINT:?set LANGFUSE_S3_ENDPOINT}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${LANGFUSE_S3_ACCESS_KEY:?set LANGFUSE_S3_ACCESS_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_S3_SECRET_KEY:?set LANGFUSE_S3_SECRET_KEY}
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: ${LANGFUSE_S3_FORCE_PATH_STYLE:-true}
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
    restart: unless-stopped

  # ── Bundled stores (profile: bundled-stores) — all-in-one box only ─────────
  # Skipped entirely unless you pass `--profile bundled-stores`. Service names
  # match the all-in-one block in .env.example. Not published to the host.
  langfuse-postgres:
    image: postgres:17
    container_name: langfuse-postgres
    profiles: ["bundled-stores"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${LANGFUSE_BUNDLED_POSTGRES_PASSWORD:?set LANGFUSE_BUNDLED_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: langfuse-clickhouse
    profiles: ["bundled-stores"]
    environment:
      CLICKHOUSE_USER: ${LANGFUSE_CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD:?set LANGFUSE_CLICKHOUSE_PASSWORD in .env}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-redis:
    image: redis:7
    container_name: langfuse-redis
    profiles: ["bundled-stores"]
    command: --requirepass ${LANGFUSE_BUNDLED_REDIS_PASSWORD:?set LANGFUSE_BUNDLED_REDIS_PASSWORD in .env}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${LANGFUSE_BUNDLED_REDIS_PASSWORD:?set LANGFUSE_BUNDLED_REDIS_PASSWORD in .env}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  langfuse-minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: langfuse-minio
    profiles: ["bundled-stores"]
    environment:
      MINIO_ROOT_USER: ${LANGFUSE_S3_ACCESS_KEY:?set LANGFUSE_S3_ACCESS_KEY in .env}
      MINIO_ROOT_PASSWORD: ${LANGFUSE_S3_SECRET_KEY:?set LANGFUSE_S3_SECRET_KEY in .env}
    volumes:
      - langfuse_minio_data:/data
    # Create the event bucket on first boot, then run minio.
    entrypoint: sh
    command: -c 'mkdir -p /data/${LANGFUSE_S3_BUCKET:-langfuse} && minio server /data --console-address ":9091"'
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
