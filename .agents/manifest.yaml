# .agents/manifest.yaml
# Agent Manifest Protocol (AMP) v1.0
# This file is the root contract for all AI agents working in this repository.
# Agents MUST read this file first before any other .agents/ content.

version: "1.0.0"
schema: "https://erxes.io/schemas/agent-manifest-v1"

# ─── Rule Layer System ───
# Rules are applied in precedence order (higher number wins conflicts).
# Agents MUST load all applicable layers before starting work.
# The auto-assembly skill injects these automatically.

rule_layers:
  - id: "constitution"
    name: "Root Constitution"
    path: "AGENTS.md"
    precedence: 0
    description: "Root source of truth. All agents must read this first."
    required: true
    scope: "global"

  - id: "global-rules"
    name: "Global Rules"
    path: ".agents/rules/*.md"
    precedence: 100
    description: "Repository-wide conventions and guidelines"
    required: true
    scope: "global"
    files:
      - non-negotiable.md
      - architecture.md
      - code-style.md
      - typescript-guidelines.md
      - react-general-guidelines.md
      - react-state-management.md
      - translations.md
      - testing-guidelines.md
      - server-migrations.md
      - nx-rules.md
      - operation-plugin-reference.md
      - github-actions-security.md
      - changelog-process.md
      - feedback-incorporation.md

  - id: "frontend-plugin-category"
    name: "Frontend Plugin Category"
    path: "frontend/plugins/AGENTS.md"
    precedence: 200
    description: "Rules for all frontend plugins"
    required: false
    scope: "category"
    applies_when: "path matches frontend/plugins/*"

  - id: "backend-plugin-category"
    name: "Backend Plugin Category"
    path: "backend/plugins/AGENTS.md"
    precedence: 200
    description: "Rules for all backend plugins"
    required: false
    scope: "category"
    applies_when: "path matches backend/plugins/*"

  - id: "plugin-specific"
    name: "Plugin-Specific Rules"
    path: "{plugin_path}/AGENTS.md"
    precedence: 300
    description: "Plugin-specific architecture and conventions"
    required: false
    scope: "plugin"
    applies_when: "path matches {plugin_path}/*"
    # Examples of plugin-specific AGENTS.md locations:
    # frontend/plugins/content_ui/AGENTS.md
    # backend/plugins/sales_api/AGENTS.md

# ─── Conflict Resolution ───
# When rules conflict, higher precedence wins.
# If same precedence, the more specific scope wins (plugin > category > global).
# If still ambiguous, the agent must ask for clarification.

conflict_resolution:
  strategy: "precedence_then_specificity"
  fallback: "ask"

# ─── Skill Registry ───
# All available skills. Each skill has a contract.yaml in its directory.
# Skills are self-describing: they declare inputs, rules, preconditions, postconditions.

skills:
  # Meta skills
  assemble-context:
    name: "assemble-context"
    description: "Auto-assemble context by loading relevant rules and skills for the current task"
    directory: ".agents/skills/assemble-context"
    type: "meta"

  detect-scope:
    name: "detect-scope"
    description: "Detects user request intent, identifies target plugin/module, loads relevant code context, and asks minimal informed questions before proceeding to intake."
    directory: ".agents/skills/detect-scope"
    type: "meta"

  intake:
    name: "intake"
    description: "Requirement gathering and scope confirmation. ALWAYS use before coding. Receives detected scope from detect-scope."
    directory: ".agents/skills/intake"
    type: "meta"

  create-plugin:
    name: "create-plugin"
    description: "Create a new erxes plugin from scratch with proper scaffolding"
    directory: ".agents/skills/create-plugin"
    type: "meta"

  # Workflow skills
  plugin-workflow:
    name: "plugin-workflow"
    description: "Baseline workflow for erxes plugin contributions"
    directory: ".agents/skills/plugin-workflow"
    type: "workflow"

  operation-plugin-reference:
    name: "operation-plugin-reference"
    description: "Apply operation plugin conventions from operation_ui and operation_api"
    directory: ".agents/skills/operation-plugin-reference"
    type: "reference"

  # Feature skills
  create-page:
    name: "create-page"
    description: "Add erxes frontend pages and routes using nearby plugin structure"
    directory: ".agents/skills/create-page"
    type: "feature"

  create-table:
    name: "create-table"
    description: "Build erxes table and list screens with existing RecordTable patterns"
    directory: ".agents/skills/create-table"
    type: "feature"

  create-query:
    name: "create-query"
    description: "Add or reuse erxes frontend GraphQL operations and Apollo hooks"
    directory: ".agents/skills/create-query"
    type: "feature"

  create-modal:
    name: "create-modal"
    description: "Add erxes modal or dialog UI by reusing existing components"
    directory: ".agents/skills/create-modal"
    type: "feature"

  create-form-drawer:
    name: "create-form-drawer"
    description: "Build erxes drawer, sheet, or dialog forms with validation"
    directory: ".agents/skills/create-form-drawer"
    type: "feature"

  create-backend-entity:
    name: "create-backend-entity"
    description: "Add or extend Mongoose-backed erxes backend entities"
    directory: ".agents/skills/create-backend-entity"
    type: "feature"

  create-backend-migration:
    name: "create-backend-migration"
    description: "Create safe erxes backend MongoDB migrations or command scripts"
    directory: ".agents/skills/create-backend-migration"
    type: "feature"

  create-provider-context:
    name: "create-provider-context"
    description: "Add scoped React providers or contexts using existing patterns"
    directory: ".agents/skills/create-provider-context"
    type: "feature"

  add-translations:
    name: "add-translations"
    description: "Add or update erxes frontend translation keys and locale JSON entries"
    directory: ".agents/skills/add-translations"
    type: "feature"

  module-federation-expose:
    name: "module-federation-expose"
    description: "Add or change erxes frontend Module Federation exposes"
    directory: ".agents/skills/module-federation-expose"
    type: "feature"

  configure-plugin-navigation:
    name: "configure-plugin-navigation"
    description: "Configure erxes frontend plugin navigation and settings"
    directory: ".agents/skills/configure-plugin-navigation"
    type: "feature"

  fix-sonar:
    name: "fix-sonar"
    description: "Fix Sonar, lint, or TypeScript issues with minimal changes"
    directory: ".agents/skills/fix-sonar"
    type: "maintenance"

  pr-review-loop:
    name: "pr-review-loop"
    description: "Post-commit PR review automation. Poll AI reviewer comments, address them, wait for CI, loop until clean."
    directory: ".agents/skills/pr-review-loop"
    type: "workflow"

