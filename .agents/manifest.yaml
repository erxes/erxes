# ─── Context Assembly Configuration ───
# How the assemble-context skill builds the working context.

context_assembly:
  # Always include these files in every context
  base_context:
    - "AGENTS.md"
    - ".agents/manifest.yaml"

  # Include matching rule layers based on working path
  auto_rules:
    enabled: true
    strategy: "layer_precedence"

  # Include skill contracts when a skill is invoked
  auto_skills:
    enabled: true
    include_contract: true
    include_skill_md: true

  # Semantic index for skill discovery and orchestration
  semantic_index:
    path: ".agents/skills/SEMANTIC_INDEX.md"
    auto_load: true
    description: "Maps symptoms, edge-cases, and complex intents to specific skill sequences"

  # Feature map for scope resolution
  feature_map:
    path: ".agents/maps/feature-map.yaml"
    auto_load: true
    description: "Maps user-facing features to plugin/module locations"

  # Canonical examples for reference
  canonical_examples:
    path: ".agents/references/canonical-examples.yaml"
    auto_load: true
    description: "Gold-standard reference implementations"

  # Session tracking
  session:
    file: ".agents/session.yaml"
    manager: ".agents/scripts/session-manager.sh"
    description: "Track agent progress and state"

  # Validation that must run before context is considered ready
  readiness_checks:
    - "All required rule layers loaded"
    - "At least one skill contract loaded (if doing skill work)"
    - "Plugin identified (if working in plugin directory)"

# ─── Validation & Enforcement ───
validation:
  # These commands validate that the agent system itself is healthy
  manifest_integrity:
    command: ".agents/scripts/validate-manifest.sh"
    description: "Check manifest.yaml, all contracts, and rule file references"

  # Plugin validation
  plugin_validation:
    command: "pnpm nx lint <plugin> && pnpm nx build <plugin>"
    description: "Build and lint a specific plugin"

  # Scaffold validation
  scaffold_validation:
    command: ".agents/scripts/validate-scaffold.sh <plugin> <scope>"
    description: "Validate a newly scaffolded plugin"

  # Deliverables verification
  deliverables_check:
    command: ".agents/scripts/check-deliverables.sh <skill> [<plugin>]"
    description: "Verify all deliverables are complete"

  # Rules compliance
  rules_compliance:
    command: ".agents/scripts/check-rules.sh [<path>]"
    description: "Verify non-negotiable rules are followed"

# ─── Agent Protocol ───
# How agents must behave when using this system.

protocol:
  # Step 1: ALWAYS read manifest.yaml first
  entry_point: ".agents/manifest.yaml"

  # Step 2: Load base context
  base_context_required: true

  # Step 3: Use assemble-context skill to load relevant rules
  context_assembly_required: true

  # Step 4: Load skill contract before executing any skill
  # This applies to detect-scope, intake, and all feature skills
  skill_contract_required: true

  # Step 5: Run detect-scope skill to identify plugin/module and load context
  # This runs silent discovery so intake asks informed questions
  detect_scope_required: true

  # Step 6: Run pre-flight check
  # Validates detect-scope completed before intake can run
  preflight_check:
    enabled: true
    command: ".agents/scripts/preflight-check.sh"
    description: "Gate: detect-scope MUST complete before intake"

  # Step 7: Run intake skill to gather requirements
  # NEVER start coding without confirmed scope
  intake_required: true

  # Step 8: Validate before declaring done
  validation_required: true

  # Step 9: Run PR review loop after creating a PR
  # Poll AI reviewer comments, address them, wait for CI, loop until clean
  pr_review_loop:
    enabled: true
    skill: "pr-review-loop"
    trigger: "after_pr_created"
    description: "Post-commit PR review automation. Mandatory after every PR."

  # When in doubt, ask rather than guess
  ambiguity_resolution: "ask"

# ─── Meta ───
meta:
  last_updated: "2026-05-29"
  maintained_by: "AI-agent-system"
  changelog: ".agents/CHANGELOG.md"
  extending_guide: ".agents/EXTENDING.md"
